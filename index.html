<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-MOVE Card Management System - V1.2 (Auto Batch Sync)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8fafc;
        }
        /* Card Styles - Based on 8272x12089 */
        .card-container {
            width: 827px;
            height: 1209px;
            background-color: white;
            background-image: url('https://lh3.googleusercontent.com/u/0/d/1PcQd4a1ALYL48oNbLWaWS5btab2RZL2z=w1000');
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            transform-origin: top left;
        }
        
        .content {
            z-index: 10;
            margin-top: 60px;
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
        }

        .logo-img {
            width: 220px;
            height: auto;
            margin-bottom: 40px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .id-number {
            font-weight: bold;
            color: #1e40af;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(255,255,255,0.8);
        }

        .sub-text {
            color: #1e40af;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.6);
            padding: 5px 30px;
            border-radius: 50px;
            margin-bottom: 20px;
        }

        .qrcode-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .qrcode-box {
            background: white;
            padding: 25px;
            border: 2px solid #ddd;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* Layout for Screen Preview */
        .preview-grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px; 
            background: #ffffff; 
            padding: 10px;
            width: fit-content;
            margin: 0 auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }
        .preview-card-wrapper {
            overflow: hidden;
            background: white;
            border: 1px solid #f0f0f0; 
        }
        .card-scaled {
            transform: scale(0.15); 
            transform-origin: top left;
            width: 827px;
            height: 1209px;
        }
        .wrapper-scaled {
            width: 124.05px; 
            height: 181.35px; 
        }

        /* Print Specific Styles */
        #print-area {
            display: none;
            width: 210mm;
            height: 297mm;
            background: white;
        }
        .print-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 1mm; 
            width: 205mm; 
            height: 290mm;
            margin: 3.5mm auto; 
            background: white;
        }
        .print-card-wrapper {
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
        }
        .print-card-scaled {
            transform: scale(0.061); 
            transform-origin: center center;
            width: 827px;
            height: 1209px;
        }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area {
                display: block !important;
                position: absolute;
                left: 0;
                top: 0;
                margin: 0;
            }
            @page {
                size: A4;
                margin: 0;
            }
        }

        .tab-active {
            border-bottom: 4px solid #db2777;
            color: #db2777;
        }

        input[type="range"] {
            accent-color: #db2777;
        }

        /* Style for Radio Buttons used as Batch Selection */
        .batch-chip input[type="radio"] {
            accent-color: #db2777;
            width: 1.2rem;
            height: 1.2rem;
            cursor: pointer;
        }

        .batch-chip {
            cursor: pointer;
            transition: all 0.2s;
        }
        .batch-chip:hover {
            background-color: #fce7f3;
        }
        .batch-chip.active {
            border-color: #db2777;
            background-color: #fdf2f8;
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-white shadow-sm border-b no-print">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2">
                    <div class="bg-pink-600 p-1.5 rounded-lg text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                        </svg>
                    </div>
                    <span class="font-bold text-xl text-gray-800 tracking-tight">V-MOVE Studio [V1.2]</span>
                </div>
                <div class="flex space-x-8 h-full">
                    <button onclick="switchTab('edit')" id="tab-edit" class="px-3 py-2 text-sm font-bold h-full tab-active transition-all">🎨 ปรับแต่ง</button>
                    <button onclick="switchTab('print')" id="tab-print" class="px-3 py-2 text-sm font-bold h-full text-gray-500 hover:text-pink-600 transition-all">🖼️ หน้ารวมภาพ 16 ใบ (4x4)</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 no-print">
        
        <div id="section-edit" class="flex flex-col lg:flex-row gap-8">
            <div class="w-full lg:w-1/3 space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border overflow-y-auto max-h-[80vh]">
                    <h2 class="font-bold text-gray-700 mb-4 border-b pb-2 text-lg">⚙️ การตั้งค่าบัตร</h2>
                    
                    <div class="space-y-6">
                        <div class="space-y-3">
                            <label class="block text-sm font-bold text-gray-600 uppercase">หมายเลข ID เริ่มต้น</label>
                            <input type="number" id="idInputSingle" value="1" min="1"
                                class="w-full px-4 py-3 border rounded-xl text-2xl font-bold text-blue-900 text-center focus:ring-2 focus:ring-pink-300 outline-none"
                                oninput="handleIdInput()">
                            <div class="flex justify-between items-center">
                                <span class="text-xs text-gray-400">ขนาดตัวเลข</span>
                                <span id="sizeValSingle" class="text-xs font-bold text-pink-600">2.0rem</span>
                            </div>
                            <input type="range" id="sizeInputSingle" min="1" max="15" step="0.1" value="2" 
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                oninput="syncInputs()">
                        </div>

                        <div class="space-y-3 pt-4 border-t">
                            <label class="block text-sm font-bold text-gray-600 uppercase">ข้อความเพิ่มเติม</label>
                            <textarea id="textInputSingle" rows="2" class="w-full px-4 py-2 border rounded-xl text-sm focus:ring-2 focus:ring-pink-300 outline-none" oninput="syncInputs()">บัตรประจำตัว แทนการเขียนชื่อ</textarea>
                            <div class="flex justify-between items-center">
                                <span class="text-xs text-gray-400">ขนาดข้อความ</span>
                                <span id="textSizeVal" class="text-xs font-bold text-pink-600">2.8rem</span>
                            </div>
                            <input type="range" id="textSizeInput" min="1" max="8" step="0.1" value="2.8" 
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                oninput="syncInputs()">
                        </div>

                        <div class="space-y-3 pt-4 border-t">
                            <label class="block text-sm font-bold text-gray-600 uppercase">QR CODE</label>
                            <div class="flex justify-between items-center">
                                <span class="text-xs text-gray-400">ขนาด QR</span>
                                <span id="qrSizeVal" class="text-xs font-bold text-pink-600">450px</span>
                            </div>
                            <input type="range" id="qrSizeInput" min="200" max="600" step="10" value="450" 
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                oninput="syncInputs()">
                            
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-xs text-gray-400">ตำแหน่ง (ขึ้น-ลง)</span>
                                <span id="qrOffsetVal" class="text-xs font-bold text-pink-600">0px</span>
                            </div>
                            <input type="range" id="qrOffsetInput" min="-200" max="200" step="5" value="0" 
                                class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer"
                                oninput="syncInputs()">
                        </div>
                    </div>
                </div>
                <button onclick="downloadSingleCard()" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold py-4 rounded-xl shadow-lg transition flex items-center justify-center gap-2">
                    💾 บันทึกรูปภาพบัตร 1 ใบ (HD)
                </button>
            </div>

            <div class="flex-1 flex flex-col items-center bg-gray-50 p-8 rounded-3xl border border-dashed border-gray-300 overflow-hidden">
                <p class="text-xs font-bold text-gray-400 mb-4 uppercase tracking-tighter">พรีวิวบัตร (ใบแรก)</p>
                <div class="scale-[0.4] origin-top">
                    <div id="single-preview"></div>
                </div>
            </div>
        </div>

        <!-- 4x4 Grid Section -->
        <div id="section-print" class="hidden space-y-6">
            <!-- Batch Selector Panel -->
            <div class="bg-white p-6 rounded-xl shadow-sm border space-y-4">
                <div class="flex items-center gap-2 border-b pb-2">
                    <span class="text-pink-600">✅</span>
                    <h3 class="font-bold text-gray-700 uppercase text-sm tracking-widest">ชุดลำดับ ID (Auto-Sync)</h3>
                </div>
                <div id="batch-selector" class="grid grid-cols-2 md:grid-cols-5 gap-3">
                    <!-- Checkboxes will be generated here -->
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h2 class="font-bold text-gray-800 text-lg">รวมภาพ 16 ใบ (พร้อมพิมพ์)</h2>
                    <p class="text-gray-500 text-sm">ช่วง ID ปัจจุบัน: <span id="current-start-id" class="font-bold text-pink-600">1</span> ถึง <span id="current-end-id" class="font-bold text-pink-600">16</span></p>
                </div>
                <div class="flex gap-4">
                    <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-8 py-4 rounded-2xl shadow-lg flex items-center gap-2">
                        🖨️ ปริ้นลงกระดาษ A4
                    </button>
                    <button onclick="downloadBatchImage()" class="bg-gray-800 hover:bg-black text-white font-bold px-8 py-4 rounded-2xl flex items-center gap-2">
                        🖼️ บันทึกเป็นรูปภาพรวม
                    </button>
                </div>
            </div>

            <div class="overflow-auto bg-white p-10 rounded-2xl shadow-inner border flex justify-center">
                <div id="preview-grid" class="preview-grid-container">
                    <!-- 16 Cards Generated by JS -->
                </div>
            </div>
        </div>
    </main>

    <div id="print-area">
        <div id="print-grid-container" class="print-grid"></div>
    </div>

    <template id="card-template">
        <div class="card-container">
            <div class="content">
                <img src="https://lh3.googleusercontent.com/u/0/d/1TWWoaINpoMvG1lxTfJeY3Fabv4y9n6-h=w1000" alt="Logo" class="logo-img" crossorigin="anonymous">
                <div class="id-number">ID</div>
                <div class="sub-text">TEXT</div>
                <div class="qrcode-wrapper">
                    <div class="qrcode-box">
                        <div class="qr-target"></div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script>
        // Initialize Batch Selector
        function initBatchSelector() {
            const container = document.getElementById('batch-selector');
            container.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const startNum = 1 + (i * 16);
                const endNum = startNum + 15;
                const label = document.createElement('label');
                label.id = `batch-label-${startNum}`;
                label.className = 'batch-chip flex items-center gap-3 p-3 border rounded-xl hover:border-pink-300 transition-colors cursor-pointer';
                label.innerHTML = `
                    <input type="radio" name="id-batch" id="radio-batch-${startNum}" value="${startNum}" onchange="setStartId(${startNum})">
                    <span class="text-sm font-bold text-gray-600 italic">ชุดที่ ${i+1}:</span>
                    <span class="text-sm font-bold text-gray-800">${startNum} - ${endNum}</span>
                `;
                container.appendChild(label);
            }
            updateActiveBatch();
        }

        // Sync batch selection when typing manual ID
        function handleIdInput() {
            updateAll();
            updateActiveBatch();
        }

        // Logic to find which batch the current ID belongs to and select it
        function updateActiveBatch() {
            const currentId = parseInt(document.getElementById('idInputSingle').value) || 1;
            
            // Calculate which batch this ID falls into
            // Formula: Find the multiple of 16 that is less than currentId
            // Example: ID 20 -> (20-1)/16 = 1.18 -> floor(1.18) = 1 -> 1*16 + 1 = 17
            const batchStart = Math.floor((currentId - 1) / 16) * 16 + 1;
            
            const radio = document.getElementById(`radio-batch-${batchStart}`);
            if (radio) {
                radio.checked = true;
                // Add visual feedback to label
                document.querySelectorAll('.batch-chip').forEach(el => el.classList.remove('active', 'border-pink-500', 'bg-pink-50'));
                const label = document.getElementById(`batch-label-${batchStart}`);
                if (label) label.classList.add('active', 'border-pink-500', 'bg-pink-50');
            } else {
                // If ID is out of range of our 10 batches, uncheck all
                document.querySelectorAll('input[name="id-batch"]').forEach(r => r.checked = false);
                document.querySelectorAll('.batch-chip').forEach(el => el.classList.remove('active', 'border-pink-500', 'bg-pink-50'));
            }
        }

        function setStartId(num) {
            document.getElementById('idInputSingle').value = num;
            updateAll();
            updateActiveBatch();
        }

        function switchTab(target) {
            document.getElementById('section-edit').classList.toggle('hidden', target !== 'edit');
            document.getElementById('section-print').classList.toggle('hidden', target !== 'print');
            document.getElementById('tab-edit').classList.toggle('tab-active', target === 'edit');
            document.getElementById('tab-print').classList.toggle('tab-active', target === 'print');
            updateAll();
        }

        function syncInputs() {
            updateAll();
        }

        function updateAll() {
            const startIdInput = document.getElementById('idInputSingle');
            const startId = parseInt(startIdInput.value) || 1;
            const idSize = document.getElementById('sizeInputSingle').value;
            const text = document.getElementById('textInputSingle').value;
            const textSize = document.getElementById('textSizeInput').value;
            const qrSize = parseInt(document.getElementById('qrSizeInput').value);
            const qrOffset = document.getElementById('qrOffsetInput').value;

            document.getElementById('sizeValSingle').innerText = idSize + 'rem';
            document.getElementById('textSizeVal').innerText = textSize + 'rem';
            document.getElementById('qrSizeVal').innerText = qrSize + 'px';
            document.getElementById('qrOffsetVal').innerText = qrOffset + 'px';
            
            document.getElementById('current-start-id').innerText = startId;
            document.getElementById('current-end-id').innerText = startId + 15;

            const config = {
                id: startId.toString(),
                idSize: idSize,
                text: text,
                textSize: textSize,
                qrSize: qrSize,
                qrOffset: qrOffset
            };

            renderSingle(config);
            renderBatch(startId, config);
        }

        function renderSingle(config) {
            const container = document.getElementById('single-preview');
            container.innerHTML = '';
            container.appendChild(createCard(config, 'qr-single'));
        }

        function renderBatch(startId, config) {
            const previewGrid = document.getElementById('preview-grid');
            const printGrid = document.getElementById('print-grid-container');
            previewGrid.innerHTML = '';
            printGrid.innerHTML = '';

            for (let i = 0; i < 16; i++) {
                const currentId = (startId + i).toString();
                const currentConfig = { ...config, id: currentId };
                
                const previewWrapper = document.createElement('div');
                previewWrapper.className = 'preview-card-wrapper wrapper-scaled';
                const previewCard = createCard(currentConfig, `qr-p-${i}`);
                previewCard.classList.add('card-scaled');
                previewWrapper.appendChild(previewCard);
                previewGrid.appendChild(previewWrapper);

                const printWrapper = document.createElement('div');
                printWrapper.className = 'print-card-wrapper';
                const printCard = createCard(currentConfig, `qr-pr-${i}`);
                printCard.classList.add('print-card-scaled');
                printWrapper.appendChild(printCard);
                printGrid.appendChild(printWrapper);
            }
        }

        function createCard(config, qrId) {
            const template = document.getElementById('card-template').content.cloneNode(true);
            const card = template.querySelector('.card-container');
            
            const idEl = card.querySelector('.id-number');
            idEl.innerText = config.id;
            idEl.style.fontSize = config.idSize + 'rem';

            const textEl = card.querySelector('.sub-text');
            textEl.innerText = config.text;
            textEl.style.fontSize = config.textSize + 'rem';

            const qrWrapper = card.querySelector('.qrcode-wrapper');
            qrWrapper.style.top = config.qrOffset + 'px';

            const qrTarget = card.querySelector('.qr-target');
            qrTarget.id = qrId;
            
            setTimeout(() => {
                new QRCode(qrId, {
                    text: config.id,
                    width: config.qrSize,
                    height: config.qrSize,
                    correctLevel: QRCode.CorrectLevel.H
                });
            }, 0);
            
            return card;
        }

        async function downloadSingleCard() {
            const card = document.querySelector('#single-preview .card-container');
            const canvas = await html2canvas(card, { scale: 5, useCORS: true, backgroundColor: null });
            saveCanvas(canvas, `VMOVE-SINGLE-${document.getElementById('idInputSingle').value}.png`);
        }

        async function downloadBatchImage() {
            const grid = document.getElementById('preview-grid');
            const canvas = await html2canvas(grid, { 
                scale: 4, 
                useCORS: true,
                backgroundColor: "#ffffff",
                logging: false
            });
            saveCanvas(canvas, `VMOVE-BATCH-${document.getElementById('idInputSingle').value}.png`);
        }

        function saveCanvas(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        window.onload = () => {
            initBatchSelector();
            updateAll();
        };
    </script>
</body>
</html>
